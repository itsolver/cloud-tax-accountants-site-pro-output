file_config:
  - glob: pages/fbt2026v2.html
    _enabled_editors:
      - visual
      - data
    _inputs:
      title:
        type: text
        label: Page title
        options:
          required: true
      cognito_embed_code:
        type: code
        label: Cognito embed code
        comment: Open the Cognito form, choose Publish Form, copy the Seamless embed code, then paste the full code into the box below.
        options:
          syntax: html
          soft_wrap: true
          min_visible_lines: 4
          max_visible_lines: 12
          required: true
